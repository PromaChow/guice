name: Confirm Flaky Test

on:
  push:
    branches:
      - master

jobs:
  confirm-flaky:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Java 11
        uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'

      - name: Compile entire project first
        run: |
          mvn clean install -DskipTests

      - name: Run test normally without NonDex
        run: |
          mvn -pl extensions/throwingproviders test \
            -Dtest=com.google.inject.throwingproviders.CheckedProviderTest#testBindingToInterfaceWithExtraMethod_Provides

      - name: Run test with NonDex
        run: |
          mvn -pl extensions/throwingproviders edu.illinois:nondex-maven-plugin:2.1.7:nondex \
            -Dtest=com.google.inject.throwingproviders.CheckedProviderTest#testBindingToInterfaceWithExtraMethod_Provides \
            -DnondexRuns=10
        continue-on-error: true